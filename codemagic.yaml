# Codemagic CI — builds the iOS app on a cloud Mac and uploads it to
# TestFlight. No Mac needed on your side: connect this repo in Codemagic,
# add the App Store Connect integration named below, fill the two vars,
# and press Start build. See SHIP_IOS.md for the click-by-click guide.
workflows:
  ios-testflight:
    name: iOS → TestFlight
    max_build_duration: 45
    instance_type: mac_mini_m2
    integrations:
      # Create this in Codemagic: Teams → Integrations → App Store Connect,
      # using an API key from appstoreconnect.apple.com → Users and Access.
      app_store_connect: scala40
    environment:
      groups:
        - scala40 # environment group holding the vars below
      vars:
        BUNDLE_ID: com.angelo.scala40
        APP_VERSION: "1.0.0"
        # AdMob iOS *App* ID (the one with the tilde ~) — required or the
        # app crashes on launch once the AdMob pod is linked.
        # ADMOB_APP_ID_IOS: ca-app-pub-1286473724303531~XXXXXXXXXX
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Generate native iOS project
        script: |
          npx cap add ios
          npx @capacitor/assets generate --ios \
            --iconBackgroundColor '#0f380f' --splashBackgroundColor '#0f380f'
          npx cap sync ios
      - name: Configure Info.plist (AdMob, ATT, encryption, version)
        script: |
          PLIST=ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :GADApplicationIdentifier string ${ADMOB_APP_ID_IOS:?set ADMOB_APP_ID_IOS in the scala40 env group}" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSUserTrackingUsageDescription string This identifier is used to show you less repetitive ads." "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $APP_VERSION" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$PLIST"
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build the .ipa
        script: |
          cd ios/App && pod install && cd ../..
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

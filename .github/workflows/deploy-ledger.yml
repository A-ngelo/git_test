name: Deploy The Ledger to GitHub Pages

# Publishes networth/ to the gh-pages branch, which GitHub Pages serves
# at https://<owner>.github.io/git_test/. Branch-based publishing is used
# because creating an Actions-source Pages site requires admin rights the
# workflow token doesn't have; pushing gh-pages auto-created the site.

on:
  push:
    branches: [main]
    paths:
      - "networth/**"
      - ".github/workflows/deploy-ledger.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish networth/ to gh-pages
        run: |
          cd networth
          touch .nojekyll
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish The Ledger (${GITHUB_SHA})"
          git push --force \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

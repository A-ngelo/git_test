# Fly.io config for the Scala 40 game server.
# Deploy: flyctl launch --copy-config --name <your-app-name>   (then: flyctl deploy)
app = "scala40"
primary_region = "iad"

[build]

[http_service]
  internal_port = 3040
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
